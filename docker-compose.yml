version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: processdb
    environment:
      POSTGRES_DB: processdb
      POSTGRES_USER: attus
      POSTGRES_PASSWORD: attus123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attus -d processdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: process-backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/processdb
      DB_USER: attus
      DB_PASSWORD: attus123
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: process-frontend
    ports:
      - "4200:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
